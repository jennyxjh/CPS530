<!-- lesson #6 
Create a one web page containing the solutions to all three problems. All images must be generated using SVG.
You must use manually written SVG code. The use of automatic generators will earn you 0 for the problem.
-->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> Lab 6 </title> 

        <style>
            body, section {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                text-align: center;
                align-items: center;
            }
          
        </style>
    </head>

    <h1> Lab 6 Solutions</h1>

    <body>
        <h3> Question 1 </h3>
        <section>
            <svg width="650" height="150">
                <polygon points="100,10 50,100 150,100" 
                style="fill:yellow; stroke:black; stroke-width: 1.5;"></polygon>
                <text x="75" y="120" font-size="10px"> Triangle </text>

                <polygon points="200,10 300,10 300,110 200,110"
                style="fill: rgb(111,187,206); stroke: black; stroke-width: 1.5;"></polygon>
                <text x="215" y="130" font-size="10px"> Quadrilateral </text>

                <polygon points="400,10 450,50 430,110 370,110 350,50"
                style="fill: rgb(246,188,167); stroke: black; stroke-width: 1.5;"></polygon>
                <text x="375" y="130" font-size="10px"> Pentagon </text>

                <polygon points="500,95 500,35 550,10 600,35 600,95 550,120"
                style="fill: rgb(122,215,187); stroke: black; stroke-width: 1.5;"></polygon>
                <text x="525" y="140" font-size="10px"> Hexagon </text>
            </svg>
        </section>

        <h3> Question 2 </h3>
        <section>
            <svg width="600" height="300">
                <circle width="100" height="100" cx="300" cy="100" r="100" fill="yellow" opacity="0.7"/>
                <text x="290" y="75" font-size="45px" font-weight="200"> Y </text>
                <circle width="100" height="100" cx="360" cy="200" r="100" fill="cyan" opacity="0.7"/>
                <text x="385" y="235" font-size="45px"> C </text>
                <circle width="100" height="100" cx="240" cy="200" r="100" fill="magenta" opacity="0.7"/>
                <text x="190" y="235" font-size="45px" font-> M </text>
            </svg>
        </section>

        <h3> Question 3 </h3>
        <section>
            <svg width="600" height="300">
                <rect width="300" height="200" x="150" y="10" fill="rgb(211,211,211)"/>
                <rect width="300" height="150" x="150" y="10" fill="rgb(169,169,169)"/>
                <rect width="300" height="100" x="150" y="10" fill="rgb(105,105,105)"/>
                <rect width="300" height="50" x="150" y="10" fill="black"/>
            </svg>
        </section>
    </body>
</html>
